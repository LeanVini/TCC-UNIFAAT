<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamentos - Marta Caires</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="page-header">
        <h1 class="page-title">Agendamentos & Clientes</h1>
        <div class="page-tabs">
            <a href="#clientes" class="tab-button active" onclick="showTab(event, 'clientes')">👥 Clientes</a>
            <a href="#agendamentos" class="tab-button" onclick="showTab(event, 'agendamentos')">📅 Agendamentos</a>
        </div>
    </header>

    <div class="container">
        <!-- Clientes Section -->
        <section id="clientes" class="content-section section-card clientes-section active">
            <div class="section-toolbar">
                <div class="search-group">
                    <input id="searchInput" type="search" class="form-input" placeholder="Buscar cliente por nome ou telefone">
                </div>
                <button id="btnNovoCliente" type="button" class="form-submit">Novo Cliente</button>
            </div>

            <h2 class="section-title">Gerenciar Clientes</h2>
            <form id="formCliente" class="form-grid">
                <input type="hidden" id="cliente_id">
                <div class="form-group">
                    <label class="form-label" for="nome">Nome Completo</label>
                    <input type="text" id="nome" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="telefone">Telefone</label>
                    <input type="tel" id="telefone" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-input">
                </div>
                <div class="form-group form-span-2">
                    <label class="form-label" for="observacoes_cliente">Observações</label>
                    <textarea id="observacoes_cliente" class="form-textarea" placeholder="Anotações sobre o cliente"></textarea>
                </div>
                <div class="form-row">
                    <div></div>
                    <button type="submit" class="form-submit">Salvar Cliente</button>
                    <button type="button" id="cancelClienteEdit" class="form-cancel">Cancelar</button>
                </div>
            </form>

            <table id="listaClientes" class="data-table">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Telefone</th>
                        <th>Email</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>

        <!-- Agendamentos Section -->
        <section id="agendamentos" class="content-section section-card agendamento-section" style="display: none;">
            <h2 class="section-title">Agendar e Consultar Clientes</h2>
            <form id="formAgendamento" class="form-grid">
                <input type="hidden" id="agendamento_id">
                <div class="form-group">
                    <label class="form-label" for="data">Data</label>
                    <input type="date" id="data" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="hora">Hora</label>
                    <input type="time" id="hora" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="tipo_massagem">Tipo de Massagem</label>
                    <select id="tipo_massagem" class="form-select" required>
                        <option value="">Carregando serviços...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="cliente_select">Cliente</label>
                    <select id="cliente_select" class="form-select" required>
                        <option value="">Carregando clientes...</option>
                        <option value="new">➕ Novo Cliente</option>
                    </select>
                </div>
                <div class="form-group" id="novocliente-fields" style="display: none;">
                    <label class="form-label" for="cliente_nome">Nome do Cliente</label>
                    <input type="text" id="cliente_nome" class="form-input">
                </div>
                <div class="form-group" id="cliente_email_group" style="display: none;">
                    <label class="form-label" for="cliente_email">Email</label>
                    <input type="email" id="cliente_email" class="form-input">
                </div>
                <div class="form-group" id="cliente_telefone_group" style="display: none;">
                    <label class="form-label" for="cliente_telefone">Telefone</label>
                    <input type="tel" id="cliente_telefone" class="form-input">
                </div>
                <div class="form-group form-span-2">
                    <label class="form-label" for="observacoes">Observações</label>
                    <textarea id="observacoes" class="form-textarea" placeholder="Informações importantes, preferências..."></textarea>
                </div>
                <div class="form-row">
                    <div></div>
                    <button type="submit" class="form-submit">Salvar Agendamento</button>
                    <button type="button" id="cancelAgendamentoEdit" class="form-cancel">Cancelar</button>
                </div>
            </form>

            <table id="listaAgendamentos" class="data-table">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Hora</th>
                        <th>Massagem</th>
                        <th>Cliente</th>
                        <th>Email</th>
                        <th>Observações</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
    </div>

    <div id="messageBox" class="message-box" style="display:none;"></div>

    <script src="js/app.js"></script>
</body>
</html>
